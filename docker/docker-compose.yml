version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ergonia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ergonia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ergonia_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ergonia_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ergonia}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ergonia_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '${REDIS_PASSWORD:-redis_secret}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Adminer - GUI quản lý DB nhẹ, chỉ dùng khi dev
  adminer:
    image: adminer:latest
    container_name: ergonia_adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools  # chỉ bật khi chạy: docker compose --profile tools up

volumes:
  postgres_data:
  redis_data: